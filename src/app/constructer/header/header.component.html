<ion-header mode="md">
  <ion-row>
    <ion-col size="2"><ion-img class="logo" src="../../assets/CRMimages/logo.png">
      </ion-img>
    </ion-col>
    <ion-col>
      <ion-row class="leads_jobs">
        <ion-col class="d-flex align-items-center justify-content-center" (click)="onJobsLeads('1')">
          <span [ngClass]="tabid == '1'?'active_btn':'' ">Leads</span>
        </ion-col>
        <ion-col class="d-flex align-items-center justify-content-center" (click)="onJobsLeads('2')">
          <span [ngClass]="tabid == '2'?'active_btn':'' ">Jobs</span>
        </ion-col>
      </ion-row>
    </ion-col>
    <ion-col size="2" class="d-flex align-items-center justify-content-center">
      <!-- <ion-img  (click)="logout()" src="../../../assets/CRMimages/shree-logout.svg"></ion-img> -->

      <ion-menu-button style="height: 18px; color: #0b7ab2;" autoHide="false"></ion-menu-button>
    </ion-col>
  </ion-row>
</ion-header>
