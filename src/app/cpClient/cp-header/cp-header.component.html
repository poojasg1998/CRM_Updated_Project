<ion-header mode="md">
  <ion-row>
    <ion-col size="2" (click)="!router.url.includes('cp-dashboard') ?dashboardRedirect():''"><ion-img class="logo"
        src="../../assets/CRMimages/logo.png">
      </ion-img>
    </ion-col>
    <ion-col>
      <ion-row class="leads_jobs">
        <ion-col class="d-flex align-items-center justify-content-center"
          *ngIf="(router.url.includes('isLeadsVisits=leads') && !router.url.includes('cp-today-activity')) || (router.url.includes('cp-dashboard') && !(router.url.includes('isLeadsVisits=visits')) && !router.url.includes('cp-today-activity'))">
          Leads Dashboard
        </ion-col>
        <ion-col class="d-flex align-items-center justify-content-center"
          *ngIf="router.url.includes('isLeadsVisits=visits') && !router.url.includes('cp-today-activity')">
          Visits Dashboard
        </ion-col>
        <ion-col class="d-flex align-items-center justify-content-center"
          *ngIf="router.url.includes('cp-today-activity')">
          Today's Scheduled
        </ion-col>
        <ion-col class="d-flex align-items-center justify-content-center"
          *ngIf="router.url.includes('cp-overdue-dashboard')">
          Missed Dashboard
        </ion-col>
        <ion-col class="d-flex align-items-center justify-content-center" *ngIf="router.url.includes('cp-bookings')">
          All Bookings
        </ion-col>
        <ion-col class="d-flex align-items-center justify-content-center" *ngIf="router.url.includes('my-executives')">
          My Executives
        </ion-col>

        <span *ngIf="router.url.includes('cp-lead-details') && router.url.includes('stageForm')">
          <ion-col class="d-flex align-items-center justify-content-center">
            Lead Status
          </ion-col>
        </span>
        <ion-col class="d-flex align-items-center justify-content-center" *ngIf="router.url.includes('add-lead')">
          Add Lead
        </ion-col>
        <ion-col class="d-flex align-items-center justify-content-center" *ngIf="router.url.includes('cp-search')">
          Seach Lead
        </ion-col>
      </ion-row>
    </ion-col>
    <ion-col size="2" class="d-flex align-items-center justify-content-center">
      <ion-menu-button style="height: 18px; color: #0b7ab2;" autoHide="false"></ion-menu-button>
    </ion-col>
  </ion-row>
</ion-header>
